<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Intro component with sign up form</title>


</head>
<body>
    <section class="main">
      <div class="hero">
        <h1>Learn to code by watching others</h1>
        <p>See how experienced developers solve problems in real-time. Watching scripted tutorials is great, but understanding how developers think is invaluable.</p>
      </div>

      <div class="try">
        <p>Try it free 7 days then $20/mo. thereafter</p>
      </div>

      <div class="form">
        <form action="index.html" method="post" autocomplete="off">
          <p>
            <label for="inome"></label>
            <input type="text" name="nome" id="inome" placeholder="Nome">
          </p>

          <p>
            <label for="isnome"></label>
            <input type="text" name="snome" id="isnome" placeholder="Sobrenome">
          </p>

          <p>
            <label for="iemail"></label>
            <input type="email" name="email" id="iemail" placeholder="Seu melhor Email">
          </p>

          <p>
            <label for="isenha"></label>
            <input type="number" name="senha" id="isenha" placeholder="Senha">
          </p>    

          <p>
            <input type="submit" value="RESGATE SEU TESTE GRÁTIS" id="submit">
          </p>

          <p id="terms">By clicking the button, you are agreeing to our <a href="">Terms and Services</a></p>
        </form>

      </div>
    </section>
  

   

  
<!--
      First Name 
  Last Name 
  Email Address
  Password

  Claim your free trial 

  
-->

  

</body>
</html>
